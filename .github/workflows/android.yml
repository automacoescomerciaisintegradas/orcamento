name: Android APK Build (Debug)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Handle Static Export (Bypass API Routes)
        run: |
          # Next.js 15+ static export fails with API routes. 
          # Move them out temporarily to generate the 'out' folder for Capacitor.
          mkdir -p api_ci_backup
          if [ -d "src/app/api" ]; then mv src/app/api api_ci_backup/; fi
          
      - name: Build Web Assets (Next.js)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
